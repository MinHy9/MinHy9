name: Update README cards

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&theme=tokyonight&hide_border=true
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate DnDn-App pin
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=ACS-DnDn&repo=DnDn-App&show_owner=true&theme=tokyonight&hide_border=true
          path: profile/pin-dndn-app.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate DnDn-Infra pin
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=ACS-DnDn&repo=DnDn-Infra&show_owner=true&theme=tokyonight&hide_border=true
          path: profile/pin-dndn-infra.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate ACS-RED pin
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=ACS-RED&repo=source-code&show_owner=true&theme=tokyonight&hide_border=true
          path: profile/pin-acs-red.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README cards" || exit 0
          git push
